<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermercado - Panel Principal</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #343a40; color: white; padding: 10px 20px; border-radius: 5px; }
        .btn-logout { background: #dc3545; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; }
        .seccion { background: white; padding: 20px; margin-top: 20px; border-radius: 5px; box-shadow: 0 0 5px rgba(0,0,0,0.05); }
        .oculto { display: none; }
        input, text-area { display: block; margin: 10px 0; padding: 8px; width: 300px; }
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        .card-producto { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 5px; text-align: center; }
        .btn-accion { background: #007bff; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Panel de Supermercado</h2>
        <button class="btn-logout" id="btnCerrarSesion">Cerrar Sesión</button>
    </div>

    <div id="seccionAgregar" class="seccion oculto">
        <h3>Ingresar Nuevo Producto al Inventario</h3>
        <form id="formProducto">
            <input type="text" id="prodNombre" placeholder="Nombre del producto" required>
            <input type="text" id="prodDesc" placeholder="Descripción">
            <input type="number" step="0.01" id="prodPrecio" placeholder="Precio" required>
            <input type="number" id="prodStock" placeholder="Stock inicial" required>
            <button type="submit" style="background: #28a745; color:white; border:none; padding:8px 15px; cursor:pointer;">Guardar Producto</button>
        </form>
    </div>

    <div class="seccion">

<div id="seccionAuditoria" class="seccion oculto">
        <h3>Historial de Movimientos</h3>
        <table border="1" width="100%" cellspacing="0" cellpadding="8" style="text-align: left; border-collapse: collapse; margin-top: 10px;">
            <thead style="background-color: #f1f1f1;">
                <tr>
                    <th>Fecha</th>
                    <th>Usuario</th>
                    <th>Acción</th>
                    <th>Producto</th>
                    <th>Cant.</th>
                    <th>IP</th>
                </tr>
            </thead>
            <tbody id="tablaAuditoria">
                </tbody>
        </table>
    </div>
    <div id="seccionUsuarios" class="seccion oculto">
        <h3>Registrar Nuevo Empleado / Usuario</h3>
        <form id="formUsuario">
            <input type="text" id="userNombre" placeholder="Nombre completo" required>
            <input type="email" id="userEmail" placeholder="Correo electrónico" required>
            <input type="password" id="userPassword" placeholder="Contraseña temporal" required>
            
            <label for="userRol" style="display:block; margin-top:10px;">Asignar Rol:</label>
            <select id="userRol" style="display: block; margin: 10px 0; padding: 8px; width: 320px;" required>
                <option value="2">Reponedor</option>
                <option value="3">Comprador</option>
                <option value="1">Administrador</option>
            </select>
            
            <button type="submit" style="background: #17a2b8; color:white; border:none; padding:8px 15px; cursor:pointer; border-radius:4px;">Registrar Usuario</button>
        </form>
    </div>

        <h3>Catálogo de Productos</h3>
        <div class="grid-productos" id="contenedorProductos">
            </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
